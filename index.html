<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Currency Converter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="container">
        <section class="converter-card">
            <h1>Currency Converter</h1>

            <form id="converterForm">

                <div class="form-group">
                    <label for="amount">Enter amount</label>
                    <input type="number" id="amount" placeholder="100" required>
                </div>

                <div class="currency-row">

                    <div class="form-group flex-group">
                        <img id="fromFlag" src="https://flagcdn.com/w40/us.png" alt="flag" class="flag-img">
                        <select id="fromCurrency"></select>
                    </div>

                    <span class="to-text">TO</span>

                    <div class="form-group flex-group">
                        <img id="toFlag" src="https://flagcdn.com/w40/in.png" alt="flag" class="flag-img">
                        <select id="toCurrency"></select>
                    </div>

                </div>

                <button type="submit" class="convert-btn">
                    Convert
                </button>

            </form>

            <p class="result-message hidden"></p>
            <p class="error-message hidden"></p>

        </section>
    </div>

    <script type="module" src="script.ts"></script>
</body>

</html>
